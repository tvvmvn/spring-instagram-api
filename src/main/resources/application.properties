# ===================================================================
# 💡 MySQL 데이터베이스 연결 설정
# ===================================================================

# 1. DB 연결 URL (로컬 3306 포트의 instagram_db 스키마로 연결, 타임존 세팅 포함)
spring.datasource.url=jdbc:mysql://localhost:3306/instagram_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true

# 2. MySQL 커넥터 드라이버 클래스명
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. 본인의 MySQL 접속 계정 정보 (실제 세팅된 아이디와 패스워드로 수정하세요)
spring.datasource.username=root
spring.datasource.password=

# ===================================================================
# 💡 JPA / Hibernate 설정
# ===================================================================

# 4. 데이터베이스 방언(Dialect) 지정 - MySQL 8.0 이상 엔진에 최적화
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 5. ddl-auto 제어 (개발 단계에서는 구조 자동 갱신을 위해 update를 사용합니다)
spring.jpa.hibernate.ddl-auto=create

# 6. 콘솔창에 실행되는 SQL 쿼리 로그 출력 및 포맷 정렬
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===================================================================
# 💡 인스타그램 이미지 물리 저장소 및 멀티파트 업로드 설정
# ===================================================================

# 1. 고화질 인스타 사진 파일 전송을 위한 단일 파일 최대 용량 제한 (기본 1MB -> 10MB 상향)
spring.servlet.multipart.max-file-size=10MB

# 2. 한 번의 요청(POST)에 포함될 수 있는 전체 데이터의 최대 용량 제한
spring.servlet.multipart.max-request-size=10MB

# 3. [핵심] 업로드된 이미지 바이너리 파일이 실제로 격리 보존될 내 컴퓨터의 절대 경로
# ⚠️ 주의: 경로 끝에 반드시 슬래시(/)를 붙여주어야 파일 저장 시 경로가 깨지지 않습니다.
file.upload-dir=/Users/jintaemin/Downloads/boilerplate/instagram_uploads/